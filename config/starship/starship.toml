"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = '''
[┌─────────────────────>](bold green)
[│](bold green)$directory$git_branch$git_commit$git_status$java$nodejs$golang$package$cmd_duration$fill$kubernetes$time
[└─](bold green)$character'''

# Disable the blank line at the start of the prompt
add_newline = false

[character]
success_symbol = "[>](bold green)"
error_symbol = "[ >](bold #EA0000)"

[cmd_duration]
min_time = 2000
format = " [⏳ $duration]($style)"
style = "yellow bold"

[fill]
symbol = ' '

[gcloud]
disabled = true

[git_status]
conflicted = '🏳${count}'
up_to_date = '✓'
untracked = '🤷${count}'
stashed = '📦${count}'
modified = '📝${count}'
staged = '[++\($count\)](green)'
renamed = '👅${count}'
deleted = '🗑${count}'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'

[golang]
format = '[$symbol($version )($mod_version )]($style)'

[java]
format = '[$symbol($version )]($style)'
style = "red"

[kubernetes]
disabled = false
format = '[$context:](#97CBFF bold)[\($namespace\)](blue bold)'

[package]
format = '[$symbol$version]($style)'

[time]
disabled = false
style = "bright-white bold"
format = ' [$time]($style) '
