"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = '''
[┌─────────────────────>](bold green)
[│](bold green)$directory$git_branch$git_status$kubernetes $java$nodejs$golang$package$memory_usage$time
[└─>](bold green) '''

# Wait 10 milliseconds for starship to check files under the current directory.
scan_timeout = 10

# Disable the blank line at the start of the prompt
add_newline = false

[memory_usage]
disabled = false
format = '$symbol[${ram}( | ${ram_pct})]($style) '
threshold = 75

[gcloud]
disabled = true

[git_status]
conflicted = '🏳${count}'
up_to_date = '✓'
untracked = '🤷${count}'
stashed = '📦${count}'
modified = '📝${count}'
staged = '[++\($count\)](green)'
renamed = '👅${count}'
deleted = '🗑${count}'
ahead = '⇡${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
behind = '⇣${count}'

[golang]
format = '[$symbol($version )($mod_version )]($style)'

[java]
format = '[$symbol($version )]($style)'
style = "red"

[kubernetes]
disabled = false
format = 'in [$context:\($namespace\)](blue bold)'

[package]
format = '[$symbol$version]($style)'

[time]
disabled = false
format = ' 🕙 [\[$time\]]($style) '
