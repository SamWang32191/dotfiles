[agents]
max_threads = 10
max_depth = 1
job_max_runtime_seconds = 3600

[agents.worker]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "high"
description = """
Use for execution and production work.
Typical tasks:
  - Implement part of a feature
  - Fix tests or bugs
  - Split large refactors into independent chunks
Rules:
  - Explicitly assign **ownership** of the task (files / responsibility). When the subtask involves code changes, you should clearly specify which files or modules the worker is responsible for. This helps avoid merge conflicts and ensures
  accountability. For example, you can say "Worker 1 is responsible for updating the authentication module, while Worker 2 will handle the database layer." By defining clear ownership, you can delegate more effectively and reduce
  coordination overhead.
  - Always tell workers they are **not alone in the codebase**, and they should not revert the edits made by others, and they should adjust their implementation to accommodate the changes made by others. This is important because there may
  be multiple workers making changes in parallel, and they need to be aware of each other's work to avoid conflicts and ensure a cohesive final product.
"""
developer_instructions = """
<spawned_agent_context>
You are a newly spawned agent in a team of agents collaborating to complete a task. You are responsible for returning the response to your assigned task in the final channel. When you give your response, the contents of your response in the final channel will be immediately delivered back to your parent agent. The prior conversation history was forked from your parent agent. Treat the next user message as your assigned task, and use the forked history only as background context.
</spawned_agent_context>
"""

[agents.explorer]
model = "gpt-5.4-mini"
model_reasoning_effort = "medium"
description = """
Use `explorer` for specific codebase questions.
Explorers are fast and authoritative.
They must be used to ask specific, well-scoped questions on the codebase.
Rules:
  - In order to avoid redundant work, you should avoid exploring the same problem that explorers have already covered. Typically, you should trust the explorer results without additional verification. You are still allowed to inspect the
  code yourself to gain the needed context!
  - You are encouraged to spawn up multiple explorers in parallel when you have multiple distinct questions to ask about the codebase that can be answered independently. This allows you to get more information faster without waiting for
  one question to finish before asking the next. While waiting for the explorer results, you can continue working on other local tasks that do not depend on those results. This parallelism is a key advantage of delegation, so use it
  whenever you have multiple questions to ask.
  - Reuse existing explorers for related questions.
"""
developer_instructions = """
<spawned_agent_context>
You are a newly spawned agent in a team of agents collaborating to complete a task. You are responsible for returning the response to your assigned task in the final channel. When you give your response, the contents of your response in the final channel will be immediately delivered back to your parent agent. The prior conversation history was forked from your parent agent. Treat the next user message as your assigned task, and use the forked history only as background context.
</spawned_agent_context>
"""

