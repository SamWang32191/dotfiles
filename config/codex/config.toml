model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 900000
personality = "pragmatic"
default_mode_request_user_input = true
plan_mode_reasoning_effort = "high"


[features]
unified_exec = true
shell_snapshot = true
steer = true
multi_agent = true
prevent_idle_sleep = true
js_repl = true

[notice]
hide_full_access_warning = true

[tui]
status_line = [
    "project-root",
    "git-branch",
    "model-with-reasoning",
    "five-hour-limit",
    "weekly-limit",
    "context-used",
]

[agents]
max_threads = 10

[agents.explore]
config_file = "./agents/explore.toml"
description = """Use `explorer` for specific codebase questions.
Explorers are fast and authoritative.
Typical tasks:
- Find files by patterns (glob)
- Search code for keywords
- Answer questions about codebase structure
Rules:
- Be specific in your questions - the more precise, the better the answer
- In order to avoid redundant work, avoid exploring the same problem that explorers have already covered
- You are encouraged to spawn multiple explorers in parallel when you have distinct questions that can be answered independently
- Reuse existing explorers for related questions"""

[agents.general]
config_file = "./agents/general.toml"
description = """Use `general` for research and investigation tasks that require multiple steps.
Typical tasks:
- Complex questions requiring gathering information from multiple sources
- Multi-step investigation tasks
- Executing parallel research on independent topics
Rules:
- This agent is slower than explorer - use explorer for simple, single questions
- Can run multiple independent research tasks in parallel to save time
- When you have 2+ independent research angles, spawn multiple general agents in parallel"""

[agents.deep]
config_file = "./agents/deep.toml"
description = """Use `deep` for deep implementation and execution tasks.
Typical tasks:
- Implementing features or bug fixes
- Complex refactoring work
- Writing or modifying code
Rules:
- This agent can modify files - use for write operations, not just research
- Assign **clear ownership** of files/modules - specify exactly which files this agent is responsible for
- The agent is **not alone** - other agents may be working in parallel, so coordinate to avoid conflicts
- When delegating coding work, instruct the agent to list changed files in the final answer"""

[agents.writing]
config_file = "./agents/writing.toml"
description = """Use `writing` for documentation and content-focused tasks.
Typical tasks:
- Writing or updating documentation (README, API docs)
- Content polishing and style improvements
- Creating prose content
Rules:
- Focus on clarity and readability
- Follow existing documentation style in the codebase
- Do not make code changes - only content/polishing work"""

[projects."/Users/samwang/dotfiles"]
trust_level = "trusted"

[projects."/Users/samwang/Repo/workspace"]
trust_level = "trusted"
