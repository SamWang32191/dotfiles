model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
personality = "pragmatic"

[features]
unified_exec = true
shell_snapshot = true
steer = true
multi_agent = true
prevent_idle_sleep = true
js_repl = true

[notice]
hide_full_access_warning = true

[tui]
status_line = ["project-root", "git-branch", "model-with-reasoning", "context-used", "five-hour-limit"]

[agents.quick]
description = "Use for low-risk, tightly scoped tasks that can be completed in 1-3 steps (single-file edits, simple shell commands, quick summaries). Avoid for multi-file refactors, deep debugging, architecture decisions, or high-stakes analysis."
config_file = "./agents/quick.toml"

[agents.implementer]
description = "Use when a concrete implementation plan already exists and execution requires complex, multi-file edits or refactors. Follow the plan step by step, coordinate dependent changes, and validate results. Avoid for lightweight, one-off tasks."
config_file = "./agents/implementer.toml"

